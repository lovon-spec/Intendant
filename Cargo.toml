[package]
name = "intendant"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "intendant-runtime"
path = "src/main.rs"

[[bin]]
name = "intendant"
path = "src/bin/caller/main.rs"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
chrono = "0.4"
env_logger = "0.9"
regex = "1.5"
reqwest = { version = "0.12", features = ["json", "rustls-tls", "stream"], default-features = false }
html2text = "0.12"
portable-pty = "0.8"
dotenvy = "0.15"
toml = "0.8"
uuid = { version = "1", features = ["v4"] }
async-trait = "0.1"
ratatui = "0.29"
crossterm = { version = "0.28", features = ["event-stream"] }
tui-textarea = "0.7"
tokio-stream = "0.1"
futures-util = "0.3"
dirs = "6"
rmcp = { version = "0.16", features = ["server", "transport-io", "client", "transport-child-process"] }
schemars = "1"
base64 = "0.22"

[target.'cfg(target_os = "linux")'.dependencies]
landlock = "0.4"

[dev-dependencies]
tempfile = "3"
