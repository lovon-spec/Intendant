[package]
name = "agent"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "agent"
path = "src/main.rs"

[[bin]]
name = "caller"
path = "src/bin/caller/main.rs"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
memmap2 = "0.5"
chrono = "0.4"
env_logger = "0.9"
regex = "1.5"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
html2text = "0.12"
portable-pty = "0.8"
dotenvy = "0.15"
toml = "0.8"
async-trait = "0.1"
ratatui = "0.29"
crossterm = { version = "0.28", features = ["event-stream"] }
tui-textarea = "0.7"
tokio-stream = "0.1"
dirs = "6"

[dev-dependencies]
tempfile = "3"
