<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Intendant</title>
<style>
:root {
  --base: #1e1e2e;
  --mantle: #181825;
  --crust: #11111b;
  --surface0: #313244;
  --surface1: #45475a;
  --surface2: #585b70;
  --overlay0: #6c7086;
  --overlay1: #7f849c;
  --text: #cdd6f4;
  --subtext0: #a6adc8;
  --subtext1: #bac2de;
  --blue: #89b4fa;
  --green: #a6e3a1;
  --teal: #94e2d5;
  --yellow: #f9e2af;
  --peach: #fab387;
  --red: #f38ba8;
  --mauve: #cba6f7;
  --lavender: #b4befe;
  --sapphire: #74c7ec;

  --log-info: var(--text);
  --log-model: var(--blue);
  --log-agent: var(--teal);
  --log-error: var(--red);
  --log-warn: var(--yellow);
  --log-subagent: var(--mauve);
  --log-detail: #a2a8be;
  --log-debug: var(--overlay1);
  --log-presence: var(--green);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%; width: 100%;
  background: var(--base);
  color: var(--text);
  font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Menlo, Monaco, Consolas, monospace;
  font-size: 13px;
  overflow: hidden;
  -webkit-text-size-adjust: none;
}

/* ── Layout ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* ── Status Bar ── */
.status-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 12px;
  background: var(--crust);
  border-bottom: 1px solid var(--surface0);
  flex-shrink: 0;
  overflow-x: auto;
  white-space: nowrap;
  font-size: 12px;
}
.status-bar .provider { color: var(--blue); }
.status-bar .model { color: var(--green); }
.status-bar .turn { color: var(--yellow); }
.status-bar .session { color: var(--overlay1); font-size: 11px; }
.status-bar .autonomy { font-weight: 600; }
.status-bar .sep { color: var(--surface2); }
.status-bar .field-label { color: var(--overlay0); font-size: 10px; margin-right: -6px; }
.budget-bar {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.budget-bar .bar-track {
  display: inline-block;
  width: 60px;
  height: 6px;
  background: var(--surface0);
  border-radius: 3px;
  overflow: hidden;
}
.budget-bar .bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s, background 0.3s;
}
.budget-pct { font-size: 11px; }

/* ── Connection Dot ── */
.conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-left: auto;
  flex-shrink: 0;
}
.conn-dot.ok { background: var(--green); }
.conn-dot.err { background: var(--red); }

/* ── Tab Bar ── */
.tab-bar {
  display: flex;
  background: var(--mantle);
  border-bottom: 1px solid var(--surface0);
  flex-shrink: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab-btn {
  padding: 8px 16px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--overlay1);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  position: relative;
}
.tab-btn:hover { color: var(--subtext1); }
.tab-btn.active {
  color: var(--blue);
  border-bottom-color: var(--blue);
}
.tab-btn .badge {
  position: absolute;
  top: 4px; right: 4px;
  min-width: 16px; height: 16px;
  border-radius: 8px;
  background: var(--red);
  color: var(--crust);
  font-size: 10px;
  font-weight: 700;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}
.tab-btn .badge.visible { display: flex; }

/* ── Tab Content ── */
.tab-content {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.tab-pane {
  display: none;
  flex-direction: column;
  position: absolute;
  inset: 0;
}
.tab-pane.active {
  display: flex;
}

/* ── Activity Toolbar ── */
.activity-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--mantle);
  border-bottom: 1px solid var(--surface0);
  flex-shrink: 0;
}
.verbosity-select {
  margin-left: auto;
  padding: 2px 6px;
  background: var(--surface0);
  border: 1px solid var(--surface1);
  border-radius: 4px;
  color: var(--subtext0);
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
}
.verbosity-select:focus { outline: none; border-color: var(--blue); }

/* ── Phase Banner ── */
.phase-banner {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0;
  font-size: 13px;
  flex-shrink: 0;
}
.phase-banner .spinner {
  display: inline-block;
  width: 14px;
  text-align: center;
}
.phase-banner.phase-thinking .phase-text { color: #b4befe; }
.phase-banner.phase-running .phase-text { color: var(--teal); }
.phase-banner.phase-waiting .phase-text { color: var(--yellow); }
.phase-banner.phase-done .phase-text { color: var(--green); }
.phase-banner.phase-idle .phase-text { color: var(--overlay1); }

/* ── Log Stream ── */
.log-stream {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 4px 0;
  scroll-behavior: smooth;
}
.log-entry {
  display: flex;
  padding: 2px 12px;
  line-height: 1.5;
  font-size: 13px;
}
.log-entry:hover { background: var(--mantle); }
.log-entry .log-icon {
  width: 20px;
  flex-shrink: 0;
  text-align: center;
  font-size: 12px;
  padding-top: 2px;
  position: relative;
}
.log-entry .log-ts {
  color: var(--overlay1);
  width: 70px;
  flex-shrink: 0;
  font-size: 11px;
  padding-top: 2px;
}
.log-entry .log-level {
  width: 52px;
  flex-shrink: 0;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  padding-top: 2px;
}
.log-entry .log-content {
  flex: 1;
  min-width: 0;
  white-space: pre-wrap;
  word-break: break-word;
}
/* Collapsible long entries */
.log-entry.collapsible {
  cursor: pointer;
}
.log-entry.collapsible .log-content {
  max-height: 1.5em;
  overflow: hidden;
  position: relative;
}
.log-entry.collapsible .collapse-toggle {
  color: var(--blue);
  font-size: 11px;
  flex-shrink: 0;
  padding: 2px 6px;
  opacity: 0.7;
}
.log-entry.collapsible:hover .collapse-toggle { opacity: 1; }
.log-entry.collapsible.expanded .log-content {
  max-height: none;
}
.log-entry.collapsible.expanded .collapse-toggle .arrow { display: none; }
.log-entry.collapsible:not(.expanded) .collapse-toggle .arrow-up { display: none; }
.log-entry .expand-hint {
  color: var(--overlay0);
  font-size: 10px;
  cursor: pointer;
  flex-shrink: 0;
  padding: 2px 4px;
}
/* Log level colors */
.log-entry.level-info .log-level { color: var(--log-info); }
.log-entry.level-model .log-level { color: var(--log-model); }
.log-entry.level-agent .log-level { color: var(--log-agent); }
.log-entry.level-error .log-level { color: var(--log-error); }
.log-entry.level-warn .log-level { color: var(--log-warn); }
.log-entry.level-subagent .log-level { color: var(--log-subagent); }
.log-entry.level-detail .log-level { color: var(--log-detail); }
.log-entry.level-debug .log-level { color: var(--log-debug); }
.log-entry.level-presence .log-level { color: var(--log-presence); }

.log-entry.level-model .log-content { color: var(--log-model); }
.log-entry.level-agent .log-content { color: var(--log-agent); }
.log-entry.level-error .log-content { color: var(--log-error); }
.log-entry.level-warn .log-content { color: var(--log-warn); }
.log-entry.level-subagent .log-content { color: var(--log-subagent); }
.log-entry.level-presence .log-content { color: var(--log-presence); }

/* Turn separator */
.log-turn-sep {
  padding: 6px 12px 2px;
  font-size: 11px;
  color: var(--overlay0);
  border-top: 1px solid var(--surface0);
  margin-top: 4px;
}
.log-turn-sep:first-child { border-top: none; margin-top: 0; }

/* Scroll-to-bottom button */
.scroll-bottom-btn {
  position: absolute;
  bottom: 12px;
  right: 20px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--surface0);
  border: 1px solid var(--surface1);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: background 0.15s;
}
.scroll-bottom-btn:hover { background: var(--surface1); }
.scroll-bottom-btn.visible { display: flex; }

/* ── Bottom Panels (Approval / Input / Follow-up) ── */
.bottom-panel {
  flex-shrink: 0;
  border-top: 1px solid var(--surface0);
  background: var(--surface0);
  display: none;
}
.bottom-panel.visible { display: block; }

.bottom-panel .panel-header {
  padding: 8px 12px 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--yellow);
}
.bottom-panel .panel-body {
  padding: 4px 12px 8px;
}

/* Approval */
.approval-command {
  padding: 6px 10px;
  background: var(--mantle);
  border-radius: 4px;
  font-size: 13px;
  margin-bottom: 8px;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 120px;
  overflow-y: auto;
}
.approval-category {
  font-size: 11px;
  color: var(--overlay1);
  margin-bottom: 8px;
}
.approval-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.approval-actions button {
  padding: 6px 14px;
  border: 1px solid var(--surface1);
  border-radius: 4px;
  background: var(--mantle);
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.approval-actions button:hover {
  background: var(--surface1);
  border-color: var(--overlay0);
}
.approval-actions button.approve { border-color: var(--green); color: var(--green); }
.approval-actions button.deny { border-color: var(--red); color: var(--red); }

/* Input / Follow-up */
.input-question {
  padding: 4px 0 8px;
  color: var(--blue);
  font-size: 13px;
}
.input-area {
  display: flex;
  gap: 8px;
}
.input-area textarea {
  flex: 1;
  padding: 6px 10px;
  background: var(--mantle);
  border: 1px solid var(--surface1);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  resize: none;
  min-height: 36px;
  max-height: 100px;
}
.input-area textarea:focus {
  outline: none;
  border-color: var(--blue);
}
.input-area button {
  padding: 6px 16px;
  background: var(--blue);
  border: none;
  border-radius: 4px;
  color: var(--crust);
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  align-self: flex-end;
}
.input-area button:hover { opacity: 0.9; }

/* ── Usage Tab ── */
.usage-container {
  padding: 16px;
  overflow-y: auto;
  flex: 1;
}
.usage-cards {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.usage-card {
  flex: 1;
  min-width: 280px;
  max-width: 420px;
  background: var(--mantle);
  border: 1px solid var(--surface0);
  border-radius: 8px;
  padding: 16px;
}
.usage-card .card-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--overlay1);
  margin-bottom: 4px;
}
.usage-card .card-model {
  font-size: 14px;
  color: var(--text);
  margin-bottom: 12px;
}
.usage-card .card-model .provider { color: var(--blue); }
.usage-card .card-model .model-name { color: var(--green); }

/* Token progress bar */
.token-bar {
  margin-bottom: 12px;
}
.token-bar .bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-bottom: 4px;
}
.token-bar .bar-label .tokens { color: var(--text); }
.token-bar .bar-label .pct { font-weight: 600; }
.token-bar .bar-track {
  width: 100%;
  height: 8px;
  background: var(--surface0);
  border-radius: 4px;
  overflow: hidden;
}
.token-bar .bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s, background 0.3s;
}

/* Token breakdown */
.token-breakdown {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 4px 12px;
  font-size: 12px;
}
.token-breakdown .label { color: var(--overlay1); }
.token-breakdown .value { color: var(--text); text-align: right; }

/* Cost summary */
.cost-section {
  margin-top: 24px;
  padding: 16px;
  background: var(--mantle);
  border: 1px solid var(--surface0);
  border-radius: 8px;
}
.cost-section .cost-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--overlay1);
  margin-bottom: 12px;
}
.cost-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px 16px;
  font-size: 13px;
}
.cost-grid .label { color: var(--overlay1); }
.cost-grid .value { text-align: right; color: var(--green); font-weight: 600; }

/* Token history */
.token-history {
  margin-top: 24px;
}
.token-history .history-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--overlay1);
  margin-bottom: 8px;
}
.history-chart {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 80px;
  padding: 0 4px;
}
.history-bar {
  flex: 1;
  min-width: 3px;
  max-width: 12px;
  background: var(--blue);
  border-radius: 2px 2px 0 0;
  opacity: 0.7;
  transition: height 0.3s, opacity 0.15s;
}
.history-bar:hover { opacity: 1; }

/* ── Terminal Tab ── */
.terminal-container {
  flex: 1;
  position: relative;
}

/* ── Displays Tab ── */
.displays-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  color: var(--overlay0);
  font-size: 14px;
  overflow: hidden;
}
.displays-container.has-displays {
  align-items: stretch;
  justify-content: stretch;
}
.displays-container:not(.has-displays) {
  align-items: center;
  justify-content: center;
}
.displays-placeholder {
  text-align: center;
  padding: 24px;
}
.displays-placeholder .icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.5;
}
.display-slot {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.display-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 12px;
  background: var(--mantle);
  border-bottom: 1px solid var(--surface0);
  flex-shrink: 0;
}
.display-label {
  font-weight: 600;
  color: var(--blue);
  font-family: monospace;
}
.display-status {
  font-size: 12px;
  color: var(--overlay0);
}
.display-status.connected { color: var(--green); }
.display-status.error { color: var(--red); }
.display-toolbar .take-control-btn,
.display-toolbar .release-control-btn {
  padding: 3px 10px;
  border: 1px solid var(--surface1);
  border-radius: 4px;
  background: var(--surface0);
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  margin-left: auto;
}
.display-toolbar .take-control-btn:hover {
  background: var(--blue);
  color: var(--base);
  border-color: var(--blue);
}
.display-toolbar .release-control-btn {
  background: var(--peach);
  color: var(--base);
  border-color: var(--peach);
}
.display-toolbar .release-control-btn:hover {
  background: var(--red);
  border-color: var(--red);
}
.display-toolbar .release-note {
  padding: 2px 8px;
  border: 1px solid var(--surface1);
  border-radius: 4px;
  background: var(--surface0);
  color: var(--text);
  font-size: 12px;
  width: 160px;
}
.display-canvas {
  flex: 1;
  min-height: 0;
  position: relative;
  background: #000;
}
.display-canvas canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100% !important;
  height: 100% !important;
}

/* ── Usage empty state ── */
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--overlay0);
  font-size: 14px;
}

/* ── Mobile ── */
@media (max-width: 600px) {
  .status-bar { font-size: 11px; gap: 8px; padding: 4px 8px; }
  .status-bar .session { display: none; }
  .tab-btn { padding: 8px 12px; font-size: 12px; }
  .log-entry { padding: 1px 8px; }
  .log-entry .log-ts { width: 55px; font-size: 10px; }
  .log-entry .log-level { width: 44px; font-size: 10px; }
  .usage-card { min-width: unset; }
  .usage-cards { flex-direction: column; }
  .budget-bar .bar-track { width: 40px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- Status Bar -->
  <div class="status-bar" id="status-bar">
    <span class="provider" id="sb-provider">--</span>
    <span class="sep">/</span>
    <span class="model" id="sb-model">--</span>
    <span class="sep">|</span>
    <span class="turn" id="sb-turn">T0</span>
    <span class="sep">|</span>
    <span class="field-label">ctx</span>
    <div class="budget-bar">
      <div class="bar-track"><div class="bar-fill" id="sb-budget-fill"></div></div>
      <span class="budget-pct" id="sb-budget-pct">0%</span>
    </div>
    <span class="sep">|</span>
    <span class="field-label">autonomy</span>
    <span class="autonomy" id="sb-autonomy">Medium</span>
    <span class="sep">|</span>
    <span class="field-label">session</span>
    <span class="session" id="sb-session"></span>
    <span class="conn-dot err" id="sb-conn"></span>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="activity">Activity<span class="badge" id="badge-activity"></span></button>
    <button class="tab-btn" data-tab="usage">Usage</button>
    <button class="tab-btn" data-tab="terminal">Terminal</button>
    <button class="tab-btn" data-tab="displays">Displays</button>
  </nav>

  <!-- Tab Content -->
  <div class="tab-content">

    <!-- Activity Tab -->
    <div id="tab-activity" class="tab-pane active">
      <div class="activity-toolbar">
        <div class="phase-banner phase-idle" id="phase-banner">
          <span class="spinner" id="phase-spinner"></span>
          <span class="phase-text" id="phase-text">Idle</span>
        </div>
        <select class="verbosity-select" id="verbosity-select" title="Log verbosity">
          <option value="normal" selected>Normal</option>
          <option value="verbose">Verbose</option>
          <option value="debug">Debug</option>
        </select>
      </div>
      <div class="log-stream" id="log-stream"></div>
      <button class="scroll-bottom-btn" id="scroll-bottom" title="Scroll to bottom">&#x2193;</button>

      <!-- Approval Panel -->
      <div class="bottom-panel" id="approval-panel">
        <div class="panel-header">Approval Required</div>
        <div class="panel-body">
          <div class="approval-command" id="approval-command"></div>
          <div class="approval-category" id="approval-category"></div>
          <div class="approval-actions">
            <button class="approve" onclick="sendApproval('approve')">Approve (y)</button>
            <button onclick="sendApproval('skip')">Skip (s)</button>
            <button onclick="sendApproval('approve_all')">Approve All (a)</button>
            <button class="deny" onclick="sendApproval('deny')">Deny (n)</button>
          </div>
        </div>
      </div>

      <!-- AskHuman Panel -->
      <div class="bottom-panel" id="human-panel">
        <div class="panel-header">Question</div>
        <div class="panel-body">
          <div class="input-question" id="human-question"></div>
          <div class="input-area">
            <textarea id="human-input" rows="2" placeholder="Type your response..."></textarea>
            <button onclick="sendHumanResponse()">Send</button>
          </div>
        </div>
      </div>

      <!-- Follow-up Panel -->
      <div class="bottom-panel" id="followup-panel">
        <div class="panel-header">Follow Up</div>
        <div class="panel-body">
          <div class="input-area">
            <textarea id="followup-input" rows="2" placeholder="Type follow-up message..."></textarea>
            <button onclick="sendFollowUp()">Send</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Usage Tab -->
    <div id="tab-usage" class="tab-pane">
      <div class="usage-container" id="usage-container">
        <div class="empty-state" id="usage-empty">Waiting for usage data...</div>
        <div class="usage-cards" id="usage-cards" style="display:none"></div>
        <div class="cost-section" id="cost-section" style="display:none">
          <div class="cost-title">Estimated Cost</div>
          <div class="cost-grid" id="cost-grid"></div>
        </div>
        <div class="token-history" id="token-history" style="display:none">
          <div class="history-title">Tokens per Turn</div>
          <div class="history-chart" id="history-chart"></div>
        </div>
      </div>
    </div>

    <!-- Terminal Tab -->
    <div id="tab-terminal" class="tab-pane">
      <div class="terminal-container" id="terminal-container"></div>
    </div>

    <!-- Displays Tab -->
    <div id="tab-displays" class="tab-pane">
      <div class="displays-container" id="displays-container">
        <div class="displays-placeholder" id="displays-placeholder">
          <div class="icon">&#x1f5b5;</div>
          <div>No displays active</div>
          <div style="font-size:12px;margin-top:8px;color:var(--surface2)">Displays will appear when the agent launches a GUI</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- xterm.js (loaded lazily for Terminal tab) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css" id="xterm-css" disabled>

<script type="module">
'use strict';

import init, { AppWeb } from '/wasm-web/presence_web.js';

// ── Constants (rendering only — all logic in WASM) ──
const SPINNER_FRAMES = ['\u280b','\u2819','\u2839','\u2838','\u283c','\u2834','\u2826','\u2827','\u2807','\u280f'];
const LEVEL_ICONS = {
  info: '\u2139', model: '\u2726', agent: '\u25B6', error: '\u2716', warn: '\u26A0',
  subagent: '\u2726', detail: '\u00B7', debug: '\u2022', presence: '\u25C9',
};
const LEVEL_TOOLTIPS = {
  info: 'Info', model: 'Model', agent: 'Agent', error: 'Error', warn: 'Warning',
  subagent: 'Sub-agent', detail: 'Detail', debug: 'Debug', presence: 'Presence',
};

// ── Minimal JS state (rendering only) ──
let app = null;
let activeTab = 'activity';
let autoScroll = true;
let logEntryCount = 0;
let currentPhase = 'idle';
let spinnerIdx = 0;
let spinnerInterval = null;

// Terminal (lazy)
let term = null;
let fitAddon = null;
let termInitialized = false;
let termBuffer = [];

// Displays
const displaySlots = new Map();
let noVNCLoaded = false;
let noVNCLoadCallbacks = [];

// ── WASM Init ──
async function main() {
  await init();
  app = new AppWeb();

  // Intercept all server messages for AppState routing
  app.set_on_raw_message((msg) => {
    const cmds = app.handle_server_message(msg);
    if (cmds) processCommands(cmds);
  });

  // Connection state indicator
  app.set_on_server_state((connected) => {
    document.getElementById('sb-conn').className = connected ? 'conn-dot ok' : 'conn-dot err';
  });

  // Connect to server
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = proto + '//' + location.host;

  // Store app globally for reconnect
  window.__presenceWeb = app;
  app.connect_server(wsUrl);

  // Fetch config for initial provider/model
  try {
    const cfg = await fetch('/config').then(r => r.json());
    if (cfg.provider) document.getElementById('sb-provider').textContent = cfg.provider;
    if (cfg.model) document.getElementById('sb-model').textContent = cfg.model;
  } catch {}
}

// ── UiCommand Processor ──
function processCommands(cmds) {
  if (!Array.isArray(cmds)) return;
  for (const c of cmds) {
    switch (c.cmd) {
      case 'add_log_entry': renderLogEntry(c); break;
      case 'clear_logs': clearLogs(); break;
      case 'add_turn_separator': renderTurnSeparator(c.turn); break;
      case 'update_status_bar': updateStatusBar(c); break;
      case 'set_phase': setPhase(c.phase); break;
      case 'show_approval': showApproval(c.id, c.command, c.category); break;
      case 'hide_approval': hidePanel('approval-panel'); break;
      case 'show_human_input': showHumanInput(c.question); break;
      case 'hide_human_input': hidePanel('human-panel'); break;
      case 'show_follow_up': showPanel('followup-panel'); break;
      case 'hide_follow_up': hidePanel('followup-panel'); break;
      case 'hide_all_panels': hideAllPanels(); break;
      case 'update_usage': renderUsageTab(c); break;
      case 'add_display': addDisplaySlot(c.display_id, c.vnc_port); break;
      case 'show_badge': showBadge(c.tab, c.text); break;
      case 'hide_badge': hideBadge(c.tab); break;
      case 'term_data': handleTermData(c.base64); break;
      case 'set_connected':
        document.getElementById('sb-conn').className = c.connected ? 'conn-dot ok' : 'conn-dot err';
        break;
    }
  }
}

// ── DOM Helpers ──

function clearLogs() {
  document.getElementById('log-stream').innerHTML = '';
  logEntryCount = 0;
}

function renderTurnSeparator(turn) {
  const stream = document.getElementById('log-stream');
  const sep = document.createElement('div');
  sep.className = 'log-turn-sep';
  sep.textContent = '\u2500\u2500 Turn ' + turn + ' \u2500\u2500';
  stream.appendChild(sep);
}

function renderLogEntry(c) {
  const stream = document.getElementById('log-stream');
  const entry = document.createElement('div');
  entry.className = 'log-entry level-' + c.level;
  entry.dataset.level = c.level;

  const icon = document.createElement('span');
  icon.className = 'log-icon';
  icon.textContent = LEVEL_ICONS[c.level] || '\u2022';
  icon.title = LEVEL_TOOLTIPS[c.level] || c.level;

  const ts = document.createElement('span');
  ts.className = 'log-ts';
  ts.textContent = (c.ts || '').substring(0, 8);

  const lvl = document.createElement('span');
  lvl.className = 'log-level';
  lvl.textContent = c.source || '\u2139';

  const cnt = document.createElement('span');
  cnt.className = 'log-content';
  cnt.textContent = c.content || '';

  entry.appendChild(icon);
  entry.appendChild(ts);
  entry.appendChild(lvl);
  entry.appendChild(cnt);

  if (c.collapsible) {
    entry.classList.add('collapsible');
    const toggle = document.createElement('span');
    toggle.className = 'collapse-toggle';
    toggle.innerHTML = '<span class="arrow">\u25B8</span><span class="arrow-up">\u25BE</span>';
    entry.appendChild(toggle);
    entry.addEventListener('click', () => entry.classList.toggle('expanded'));
  }

  stream.appendChild(entry);
  logEntryCount++;

  // Cap entries in DOM
  if (logEntryCount > 10000) {
    const first = stream.querySelector('.log-entry, .log-turn-sep');
    if (first) { stream.removeChild(first); logEntryCount--; }
  }

  if (autoScroll) stream.scrollTop = stream.scrollHeight;
}

function updateStatusBar(d) {
  if (d.provider) document.getElementById('sb-provider').textContent = d.provider;
  if (d.model) document.getElementById('sb-model').textContent = d.model;
  if (d.turn !== undefined && d.turn !== null) document.getElementById('sb-turn').textContent = 'T' + d.turn;
  if (d.budget_pct !== undefined && d.budget_pct !== null) {
    const fill = document.getElementById('sb-budget-fill');
    const label = document.getElementById('sb-budget-pct');
    const pct = d.budget_pct;
    fill.style.width = Math.min(pct, 100) + '%';
    const color = pct < 50 ? '#a6e3a1' : pct < 85 ? '#f9e2af' : '#f38ba8';
    fill.style.background = color;
    label.textContent = pct.toFixed(1) + '%';
    label.style.color = color;
  }
  if (d.autonomy) {
    const el = document.getElementById('sb-autonomy');
    el.textContent = d.autonomy;
    const colors = { Low: '#f38ba8', Medium: '#f9e2af', High: '#94e2d5', Full: '#a6e3a1' };
    el.style.color = colors[d.autonomy] || '#f9e2af';
  }
  if (d.session_id) {
    document.getElementById('sb-session').textContent = d.session_id.substring(0, 8);
  }
}

function setPhase(phase) {
  currentPhase = phase;
  const banner = document.getElementById('phase-banner');
  const text = document.getElementById('phase-text');
  banner.className = 'phase-banner';
  const np = phase.replace('waiting_', 'waiting').replace('running_', 'running');
  const labels = {
    idle: 'Idle', thinking: 'Thinking...', running: 'Running Agent', runningagent: 'Running Agent',
    waiting: 'Waiting for Input', waitingapproval: 'Waiting for Approval',
    waitinghuman: 'Waiting for Response', waitingfollowup: 'Waiting for Follow-up',
    orchestrating: 'Orchestrating', done: 'Done',
  };
  const cat = np.startsWith('waiting') ? 'waiting' : np.startsWith('running') ? 'running' :
    np === 'orchestrating' ? 'thinking' : np;
  banner.classList.add('phase-' + cat);
  text.textContent = labels[np] || labels[phase] || phase;

  if (phase === 'idle' || phase === 'done') {
    if (spinnerInterval) { clearInterval(spinnerInterval); spinnerInterval = null; }
    document.getElementById('phase-spinner').textContent = phase === 'done' ? '\u2713' : '';
  } else if (!spinnerInterval) {
    const el = document.getElementById('phase-spinner');
    spinnerInterval = setInterval(() => {
      spinnerIdx = (spinnerIdx + 1) % SPINNER_FRAMES.length;
      el.textContent = SPINNER_FRAMES[spinnerIdx];
    }, 80);
  }
}

function showApproval(id, command, category) {
  hideAllPanels();
  document.getElementById('approval-command').textContent = command;
  document.getElementById('approval-category').textContent = category ? 'Category: ' + category : '';
  document.getElementById('approval-panel').classList.add('visible');
}

function showHumanInput(question) {
  hideAllPanels();
  document.getElementById('human-question').textContent = question;
  document.getElementById('human-panel').classList.add('visible');
}

function showPanel(id) { hideAllPanels(); document.getElementById(id).classList.add('visible'); }
function hidePanel(id) { document.getElementById(id).classList.remove('visible'); }
function hideAllPanels() { document.querySelectorAll('.bottom-panel').forEach(p => p.classList.remove('visible')); }

function showBadge(tab, text) {
  const badge = document.getElementById('badge-' + tab);
  if (badge) { badge.textContent = text; badge.classList.add('visible'); }
}
function hideBadge(tab) {
  const badge = document.getElementById('badge-' + tab);
  if (badge) { badge.classList.remove('visible'); badge.textContent = ''; }
}

// ── Usage Tab Rendering ──
function renderUsageTab(c) {
  const cardsEl = document.getElementById('usage-cards');
  const emptyEl = document.getElementById('usage-empty');
  const costEl = document.getElementById('cost-section');
  const historyEl = document.getElementById('token-history');

  if (!c.main_json) {
    emptyEl.style.display = 'flex';
    cardsEl.style.display = 'none';
    costEl.style.display = 'none';
    historyEl.style.display = 'none';
    return;
  }

  emptyEl.style.display = 'none';
  cardsEl.style.display = 'flex';
  cardsEl.innerHTML = '';

  const mainData = JSON.parse(c.main_json);
  cardsEl.appendChild(renderUsageCard('Main Model', mainData));

  if (c.presence_json) {
    const presenceData = JSON.parse(c.presence_json);
    cardsEl.appendChild(renderUsageCard('Presence Model', presenceData));
  }

  // Cost
  if (c.cost_json) {
    const cost = JSON.parse(c.cost_json);
    costEl.style.display = 'block';
    const grid = document.getElementById('cost-grid');
    grid.innerHTML = '';
    for (const cl of cost.lines) {
      grid.innerHTML += `<span class="label">${cl.label}</span><span class="value">$${cl.cost.toFixed(4)}</span>`;
      grid.innerHTML += `<span class="label" style="padding-left:12px;font-size:11px">Input</span><span class="value" style="font-size:11px;font-weight:normal">$${cl.input_cost.toFixed(4)}</span>`;
      grid.innerHTML += `<span class="label" style="padding-left:12px;font-size:11px">Output</span><span class="value" style="font-size:11px;font-weight:normal">$${cl.output_cost.toFixed(4)}</span>`;
    }
    if (cost.lines.length > 1) {
      grid.innerHTML += `<span class="label" style="font-weight:600;color:var(--text)">Total</span><span class="value">$${cost.total.toFixed(4)}</span>`;
    }
  } else {
    costEl.style.display = 'none';
  }

  // History
  if (c.history_json) {
    const history = JSON.parse(c.history_json);
    historyEl.style.display = 'block';
    const chart = document.getElementById('history-chart');
    const maxTokens = Math.max(...history.map(h => h.tokens), 1);
    chart.innerHTML = '';
    for (const h of history) {
      const bar = document.createElement('div');
      bar.className = 'history-bar';
      bar.style.height = Math.max((h.tokens / maxTokens) * 100, 2) + '%';
      bar.title = `Turn ${h.turn}: ${h.tokens.toLocaleString()} tokens`;
      chart.appendChild(bar);
    }
  } else {
    historyEl.style.display = 'none';
  }
}

function renderUsageCard(label, data) {
  const card = document.createElement('div');
  card.className = 'usage-card';
  const color = data.usage_pct < 50 ? '#a6e3a1' : data.usage_pct < 85 ? '#f9e2af' : '#f38ba8';
  const prompt = data.prompt_tokens || 0;
  const completion = data.completion_tokens || 0;
  const cached = data.cached_tokens || 0;
  const uncachedInput = prompt - cached;
  card.innerHTML = `
    <div class="card-title">${label}</div>
    <div class="card-model"><span class="provider">${data.provider}</span> / <span class="model-name">${data.model}</span></div>
    <div class="token-bar">
      <div class="bar-label">
        <span class="tokens">${data.tokens_used.toLocaleString()} / ${data.context_window.toLocaleString()}</span>
        <span class="pct" style="color:${color}">${data.usage_pct.toFixed(1)}%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(data.usage_pct, 100)}%;background:${color}"></div></div>
    </div>
    <div class="token-breakdown">
      <span class="label">Input tokens</span><span class="value">${prompt.toLocaleString()}</span>
      <span class="label" style="padding-left:12px">Cached</span>
      <span class="value" style="color:var(--green)">${cached.toLocaleString()}${prompt > 0 ? ' (' + (cached / prompt * 100).toFixed(0) + '%)' : ''}</span>
      <span class="label" style="padding-left:12px">Uncached</span><span class="value">${uncachedInput.toLocaleString()}</span>
      <span class="label">Output tokens</span><span class="value">${completion.toLocaleString()}</span>
      <span class="label" style="border-top:1px solid var(--surface0);padding-top:4px;margin-top:4px">Remaining</span>
      <span class="value" style="border-top:1px solid var(--surface0);padding-top:4px;margin-top:4px">${(data.context_window - data.tokens_used).toLocaleString()}</span>
    </div>`;
  return card;
}

// ── Terminal Tab (lazy xterm.js) ──
function handleTermData(base64data) {
  if (term) {
    const bytes = Uint8Array.from(atob(base64data), c => c.charCodeAt(0));
    term.write(bytes);
  } else {
    termBuffer.push(base64data);
  }
}

function initTerminal() {
  if (termInitialized) return;
  termInitialized = true;
  document.getElementById('xterm-css').removeAttribute('disabled');
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js';
  script.onload = () => {
    const fitScript = document.createElement('script');
    fitScript.src = 'https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.min.js';
    fitScript.onload = () => {
      term = new Terminal({
        theme: {
          background: '#1e1e2e', foreground: '#cdd6f4', cursor: '#f5e0dc', cursorAccent: '#1e1e2e',
          selectionBackground: '#45475a',
          black: '#45475a', red: '#f38ba8', green: '#a6e3a1', yellow: '#f9e2af',
          blue: '#89b4fa', magenta: '#cba6f7', cyan: '#94e2d5', white: '#bac2de',
          brightBlack: '#585b70', brightRed: '#f38ba8', brightGreen: '#a6e3a1',
          brightYellow: '#f9e2af', brightBlue: '#89b4fa', brightMagenta: '#cba6f7',
          brightCyan: '#94e2d5', brightWhite: '#a6adc8',
        },
        fontFamily: "'JetBrains Mono', 'Fira Code', Menlo, Monaco, monospace",
        fontSize: 13, allowProposedApi: true,
      });
      fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminal-container'));
      fitAddon.fit();
      term.onData(data => {
        for (const ch of data) app.send_key(ch, false, false, false);
      });
      for (const b64 of termBuffer) {
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        term.write(bytes);
      }
      termBuffer = [];
      new ResizeObserver(() => {
        if (fitAddon && activeTab === 'terminal') fitAddon.fit();
      }).observe(document.getElementById('terminal-container'));
      term.onResize(({ cols, rows }) => app.send_resize(cols, rows));
    };
    document.head.appendChild(fitScript);
  };
  document.head.appendChild(script);
}

// ── Displays (noVNC — stays JS, manages VNC WebSocket + canvas) ──
function loadNoVNC(cb) {
  if (noVNCLoaded) { cb(); return; }
  noVNCLoadCallbacks.push(cb);
  if (noVNCLoadCallbacks.length > 1) return;
  const script = document.createElement('script');
  script.type = 'module';
  script.textContent = `
    import RFB from 'https://cdn.jsdelivr.net/gh/novnc/noVNC@v1.6.0/core/rfb.js';
    window.__noVNC_RFB = RFB;
    window.dispatchEvent(new Event('novnc-loaded'));
  `;
  window.addEventListener('novnc-loaded', () => {
    noVNCLoaded = true;
    for (const fn of noVNCLoadCallbacks) fn();
    noVNCLoadCallbacks = [];
  }, { once: true });
  document.head.appendChild(script);
}

class DisplaySlot {
  constructor(displayId, vncPort) {
    this.displayId = displayId;
    this.vncPort = vncPort;
    this.rfb = null;
    this.interactive = false;
    this.connected = false;
    this.el = document.createElement('div');
    this.el.className = 'display-slot';
    this.el.innerHTML = `
      <div class="display-toolbar">
        <span class="display-label">:${displayId}</span>
        <span class="display-status" id="ds-status-${displayId}">Connecting...</span>
        <input class="release-note" id="ds-note-${displayId}" placeholder="Note (optional)" style="display:none">
        <button class="take-control-btn" id="ds-take-${displayId}">Take Control</button>
        <button class="release-control-btn" id="ds-release-${displayId}" style="display:none">Release</button>
      </div>
      <div class="display-canvas" id="display-canvas-${displayId}"></div>`;
    this.statusEl = this.el.querySelector(`#ds-status-${displayId}`);
    this.noteInput = this.el.querySelector(`#ds-note-${displayId}`);
    this.takeBtn = this.el.querySelector(`#ds-take-${displayId}`);
    this.releaseBtn = this.el.querySelector(`#ds-release-${displayId}`);
    this.canvasEl = this.el.querySelector(`#display-canvas-${displayId}`);
    this.takeBtn.addEventListener('click', () => this.takeControl());
    this.releaseBtn.addEventListener('click', () => this.releaseControl());
  }
  connectPassive() { loadNoVNC(() => this._connectVNC()); }
  _connectVNC() {
    const RFB = window.__noVNC_RFB;
    if (!RFB) return;
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    try {
      this.rfb = new RFB(this.canvasEl, `${proto}//${location.host}/vnc?port=${this.vncPort}`);
      this.rfb.viewOnly = true; this.rfb.scaleViewport = true;
      this.rfb.resizeSession = false; this.rfb.background = '#1e1e2e';
      this.rfb.addEventListener('connect', () => {
        this.connected = true; this.statusEl.textContent = 'Connected (view-only)';
        this.statusEl.className = 'display-status connected';
      });
      this.rfb.addEventListener('disconnect', (e) => {
        this.connected = false;
        this.statusEl.textContent = e.detail.clean ? 'Disconnected' : 'Connection lost';
        this.statusEl.className = 'display-status error';
        if (!e.detail.clean) setTimeout(() => { if (!this.connected) this._connectVNC(); }, 3000);
      });
      this.rfb.addEventListener('securityfailure', () => {
        this.statusEl.textContent = 'Security error'; this.statusEl.className = 'display-status error';
      });
    } catch { this.statusEl.textContent = 'Failed'; this.statusEl.className = 'display-status error'; }
  }
  takeControl() {
    if (!this.rfb) return;
    this.interactive = true; this.rfb.viewOnly = false; this.rfb.focus();
    this.takeBtn.style.display = 'none'; this.releaseBtn.style.display = '';
    this.noteInput.style.display = ''; this.statusEl.textContent = 'Interactive';
    this.statusEl.className = 'display-status connected';
    if (app) app.take_display(this.displayId);
  }
  releaseControl() {
    if (!this.rfb) return;
    this.interactive = false; this.rfb.viewOnly = true;
    const note = this.noteInput.value.trim() || undefined;
    this.noteInput.value = ''; this.noteInput.style.display = 'none';
    this.takeBtn.style.display = ''; this.releaseBtn.style.display = 'none';
    this.statusEl.textContent = this.connected ? 'Connected (view-only)' : 'Disconnected';
    if (app) app.release_display(this.displayId, note);
  }
  disconnect() { if (this.rfb) { this.rfb.disconnect(); this.rfb = null; } this.connected = false; }
}

function addDisplaySlot(displayId, vncPort) {
  if (displaySlots.has(displayId) || !vncPort) return;
  const slot = new DisplaySlot(displayId, vncPort);
  displaySlots.set(displayId, slot);
  const container = document.getElementById('displays-container');
  const placeholder = document.getElementById('displays-placeholder');
  if (placeholder) placeholder.style.display = 'none';
  container.classList.add('has-displays');
  container.appendChild(slot.el);
  slot.connectPassive();
}

// ── Tab Switching ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

function switchTab(tabId) {
  activeTab = tabId;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tabId));
  if (app) processCommands(app.set_active_tab(tabId));
  if (tabId === 'terminal' && !termInitialized) initTerminal();
  if (tabId === 'terminal' && term) requestAnimationFrame(() => fitAddon && fitAddon.fit());
  if (tabId === 'displays') {
    requestAnimationFrame(() => {
      for (const slot of displaySlots.values()) { if (slot.rfb) slot.rfb.scaleViewport = true; }
    });
  }
}

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (activeTab === 'activity' && app && app.pending_approval_id() !== null) {
    if (e.key === 'y') { processCommands(app.send_approval('approve')); e.preventDefault(); }
    else if (e.key === 's') { processCommands(app.send_approval('skip')); e.preventDefault(); }
    else if (e.key === 'a') { processCommands(app.send_approval('approve_all')); e.preventDefault(); }
    else if (e.key === 'n') { processCommands(app.send_approval('deny')); e.preventDefault(); }
  }
});

// ── Approval / Input / Follow-up actions (from HTML onclick) ──
window.sendApproval = function(action) {
  if (app) processCommands(app.send_approval(action));
};
window.sendHumanResponse = function() {
  const input = document.getElementById('human-input');
  const text = input.value.trim();
  if (!text || !app) return;
  processCommands(app.send_human_response(text));
  input.value = '';
};
window.sendFollowUp = function() {
  const input = document.getElementById('followup-input');
  const text = input.value.trim();
  if (!text || !app) return;
  processCommands(app.send_follow_up(text));
  input.value = '';
};

// Enter to submit
document.querySelectorAll('#human-input, #followup-input').forEach(ta => {
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (ta.id === 'human-input') window.sendHumanResponse();
      else window.sendFollowUp();
    }
  });
});

// Verbosity toggle
document.getElementById('verbosity-select').addEventListener('change', (e) => {
  if (app) processCommands(app.set_verbosity(e.target.value));
});

// Auto-scroll detection
(function() {
  const stream = document.getElementById('log-stream');
  const btn = document.getElementById('scroll-bottom');
  stream.addEventListener('scroll', () => {
    const atBottom = stream.scrollHeight - stream.scrollTop - stream.clientHeight < 30;
    autoScroll = atBottom;
    btn.classList.toggle('visible', !atBottom);
  });
  btn.addEventListener('click', () => {
    stream.scrollTop = stream.scrollHeight;
    autoScroll = true; btn.classList.remove('visible');
  });
})();

// ── Start ──
main();
</script>
</body>
</html>
