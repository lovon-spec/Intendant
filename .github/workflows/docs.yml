name: Deploy docs

on:
  push:
    branches: [main]
    # The published mdBook is only docs/src + book.toml. Without this filter
    # every push to main redeployed a byte-identical Pages artifact (~9 of
    # every 10 pushes touch no book sources). Mirrors audit.yml's scoping.
    paths:
      - "docs/src/**"
      - "docs/book.toml"
      - ".github/workflows/docs.yml"
  # Manual escape hatch: redeploy without faking a docs commit.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@mdbook
      - run: mdbook build docs
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book
      - id: deployment
        uses: actions/deploy-pages@v4
